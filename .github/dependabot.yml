# Dependabot version and security updates
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      npm_and_yarn:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/.agents/skills/next-browser"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      npm_and_yarn:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/.agents/skills/next-browser/prototypes/cloud"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      npm_and_yarn:
        patterns:
          - "*"
